name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  # Live published Haven URL — the Android shell loads this URL in its WebView.
  CAP_SERVER_URL: https://grow-together-haven.lovable.app
  VITE_REMOTE_API_BASE: https://grow-together-haven.lovable.app
  VITE_SUPABASE_URL: https://nmxcuxhckhcajcvdoeeu.supabase.co
  VITE_SUPABASE_PROJECT_ID: nmxcuxhckhcajcvdoeeu
  VITE_SUPABASE_PUBLISHABLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5teGN1eGhja2hjYWpjdmRvZWV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3OTQ3MDIsImV4cCI6MjA5NzM3MDcwMn0.46SdkiHup0An7Lh9x_0M4a7n2Al_DG4ChTM5pxcQyJc

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java (JDK 21)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-34 build-tools;34.0.0 platform-tools"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web bundle (+ Capacitor index.html)
        run: bun run cap:build

      - name: Add Android platform
        run: npx --yes cap add android

      - name: Sync Capacitor → Android
        run: npx --yes cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: haven-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
