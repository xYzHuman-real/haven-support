name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  # The React SPA is bundled into the APK at build time (see scripts/build-capacitor.js).
  # Data calls are routed to this remote backend by src/lib/native-fetch-bridge.ts.
  VITE_REMOTE_API_BASE: https://grow-together-haven.lovable.app
  VITE_SUPABASE_URL: https://nmxcuxhckhcajcvdoeeu.supabase.co
  VITE_SUPABASE_PROJECT_ID: nmxcuxhckhcajcvdoeeu
  VITE_SUPABASE_PUBLISHABLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5teGN1eGhja2hjYWpjdmRvZWV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3OTQ3MDIsImV4cCI6MjA5NzM3MDcwMn0.46SdkiHup0An7Lh9x_0M4a7n2Al_DG4ChTM5pxcQyJc

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java (JDK 21)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-34 build-tools;34.0.0 platform-tools"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Write Capacitor fallback shell
        run: bun run cap:build

      - name: Add Android platform
        run: npx --yes cap add android

      - name: Write google-services.json from secret
        env:
          GOOGLE_SERVICES_JSON_B64: ${{ secrets.GOOGLE_SERVICES_JSON_B64 }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON_B64" ]; then
            echo "ERROR: GOOGLE_SERVICES_JSON_B64 secret is not set."
            echo "Get it from Firebase Console → Project Settings → Your Android app → google-services.json,"
            echo "then base64-encode it and add as a repo secret named GOOGLE_SERVICES_JSON_B64:"
            echo "  base64 -w0 google-services.json | pbcopy   # macOS"
            echo "  base64 -w0 google-services.json            # Linux"
            exit 1
          fi
          mkdir -p android/app
          echo "$GOOGLE_SERVICES_JSON_B64" | base64 -d > android/app/google-services.json
          echo "Wrote android/app/google-services.json ($(wc -c < android/app/google-services.json) bytes)"

      - name: Apply Google Services Gradle plugin
        run: |
          # Project-level build.gradle — add classpath
          if ! grep -q "com.google.gms:google-services" android/build.gradle; then
            sed -i '/dependencies {/a\        classpath '"'"'com.google.gms:google-services:4.4.2'"'"'' android/build.gradle
          fi
          # App-level build.gradle — apply plugin
          if ! grep -q "com.google.gms.google-services" android/app/build.gradle; then
            echo "" >> android/app/build.gradle
            echo "apply plugin: 'com.google.gms.google-services'" >> android/app/build.gradle
          fi
          echo "--- android/build.gradle ---"
          grep -n "google-services" android/build.gradle || true
          echo "--- android/app/build.gradle (tail) ---"
          tail -5 android/app/build.gradle

      - name: Sync Capacitor → Android
        run: npx --yes cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Print debug keystore SHA-1 (register in Firebase Console)
        run: keytool -list -v -keystore ~/.android/debug.keystore -alias androiddebugkey -storepass android -keypass android | grep SHA1 || true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: haven-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
